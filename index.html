<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartProof · Booth Labeling Bench</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@75..100,400..800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#15181D; --panel:#1C2026; --panel2:#20252C; --line:#2A3038;
  --ink:#E9ECF0; --muted:#8B93A1; --faint:#5A6270;
  --accent:#FF8A1E; --accent-dim:#7a4a17;
  --pass:#5BC489; --warn:#E5604C;
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --sans:'Archivo',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--ink);font:14px/1.45 var(--sans);overflow:hidden}
button{font-family:var(--sans);cursor:pointer}
input,select,textarea{font-family:var(--sans);color:var(--ink);background:var(--bg);
  border:1px solid var(--line);border-radius:6px;padding:6px 8px;font-size:13px;width:100%}
input[type=number]{font-family:var(--mono)}
input:focus,select:focus,textarea:focus{outline:2px solid var(--accent);outline-offset:-1px;border-color:var(--accent)}
::placeholder{color:var(--faint)}

/* ── top bar: measuring-tape tick strip ───────────────────────────── */
header{height:52px;display:flex;align-items:center;gap:16px;padding:0 16px;
  border-bottom:1px solid var(--line);background:var(--panel);
  background-image:repeating-linear-gradient(90deg,transparent 0 39px,var(--line) 39px 40px);
  background-size:100% 8px;background-position:bottom;background-repeat:no-repeat}
header h1{font-size:16px;font-weight:800;letter-spacing:.04em;font-stretch:80%}
header h1 b{color:var(--accent)}
header .spacer{flex:1}
.btn{border:1px solid var(--line);background:var(--panel2);color:var(--ink);
  border-radius:7px;padding:7px 14px;font-size:13px;font-weight:600}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#1a1206}
.btn.primary:hover{filter:brightness(1.1);color:#1a1206}
.btn:disabled{opacity:.4;cursor:not-allowed}
#exportNote{font-size:12px;color:var(--muted)}

/* ── 3-pane bench ─────────────────────────────────────────────────── */
main{display:grid;grid-template-columns:230px 1fr 360px;height:calc(100% - 52px);min-height:0}
main>*{min-height:0}
@media(max-width:1000px){main{grid-template-columns:200px 1fr 320px}}

/* queue */
#queue{border-right:1px solid var(--line);background:var(--panel);overflow-y:auto;display:flex;flex-direction:column}
#queue .qhead{padding:12px 12px 8px;font-size:11px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase}
.qitem{display:flex;align-items:center;gap:8px;padding:9px 12px;border-bottom:1px solid var(--line);
  cursor:pointer;font-size:13px}
.qitem:hover{background:var(--panel2)}
.qitem.active{background:var(--panel2);box-shadow:inset 3px 0 0 var(--accent)}
.qitem .dot{width:8px;height:8px;border-radius:50%;background:var(--faint);flex:none}
.qitem.done .dot{background:var(--pass)}
.qitem .nm{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#queueEmpty{padding:20px 14px;color:var(--faint);font-size:13px}

/* viewer */
#viewerWrap{display:flex;flex-direction:column;min-width:0;min-height:0;background:#101216}
#vtools{height:42px;flex:none;display:flex;align-items:center;gap:8px;padding:0 12px;border-bottom:1px solid var(--line);background:var(--panel)}
#vtools .pg{font-family:var(--mono);font-size:12px;color:var(--muted)}
#viewer{flex:1;min-height:0;overflow:auto;padding:18px;text-align:center}
#viewer canvas{display:block;margin:0 auto 14px;box-shadow:0 4px 18px rgba(0,0,0,.5);border-radius:3px;background:#fff}
#viewerEmpty{color:var(--faint);margin-top:18vh;font-size:14px}
#viewerEmpty .big{font-size:42px;font-weight:800;font-stretch:75%;color:var(--line);letter-spacing:.02em}

/* form */
#formPane{border-left:1px solid var(--line);background:var(--panel);overflow-y:auto;padding:14px 14px 90px}
.sec{border:1px solid var(--line);border-radius:9px;background:var(--panel2);margin-bottom:10px;overflow:hidden}
.sec>.shead{display:flex;align-items:center;gap:9px;padding:9px 11px;cursor:pointer;user-select:none}
.sec .pip{width:9px;height:9px;border-radius:50%;border:1.5px solid var(--faint);flex:none;transition:.15s}
.sec.touched .pip{background:var(--accent);border-color:var(--accent)}
.sec .stitle{font-weight:700;font-size:13px;flex:1}
.sec .sidx{font-family:var(--mono);font-size:10px;color:var(--faint)}
.sec .sbody{padding:4px 11px 12px;border-top:1px solid var(--line)}
.sec.closed .sbody{display:none}
.row{display:flex;gap:8px;margin-top:8px}
.row>div{flex:1;min-width:0}
label.fl{display:block;font-size:11px;color:var(--muted);margin-bottom:3px;letter-spacing:.02em}
.seg{display:flex;border:1px solid var(--line);border-radius:6px;overflow:hidden}
.seg button{flex:1;background:var(--bg);color:var(--muted);border:none;padding:6px 4px;font-size:12px;font-weight:600;border-right:1px solid var(--line)}
.seg button:last-child{border-right:none}
.seg button.on{background:var(--accent);color:#1a1206}
.seg button.on.no{background:#39414d;color:var(--ink)}
.hint{font-size:11px;color:var(--faint);margin-top:6px}
.subgrp{margin-top:4px}
.subgrp.hidden{display:none}
textarea{min-height:56px;resize:vertical}

/* save bar */
#saveBar{position:fixed;right:0;bottom:0;width:360px;padding:12px 14px;background:var(--panel);
  border-top:1px solid var(--line);border-left:1px solid var(--line);display:flex;gap:8px;align-items:center}
@media(max-width:1000px){#saveBar{width:320px}}
#saveState{font-size:12px;color:var(--muted);flex:1}
#saveState.ok{color:var(--pass)}
.navbtns{display:flex;gap:6px}

input[type=file]{display:none}
.zoombtn{width:30px;height:28px;border:1px solid var(--line);background:var(--panel2);color:var(--ink);border-radius:6px;font-size:15px;font-weight:700}
.zoombtn:hover{border-color:var(--accent);color:var(--accent)}
</style>
</head>
<body>

<header>
  <h1>SMART<b>PROOF</b> · LABELING BENCH</h1>
  <button class="btn" id="btnLoad">Load PDFs</button>
  <button class="btn" id="btnImport">Import labels.jsonl</button>
  <span class="spacer"></span>
  <span id="exportNote">0 / 0 labeled</span>
  <button class="btn" id="btnExportPdfs">Export PDFs</button>
  <button class="btn primary" id="btnExport">Export labels.jsonl</button>
  <input type="file" id="fileInput" accept="application/pdf" multiple>
  <input type="file" id="importInput" accept=".jsonl,.json">
</header>

<main>
  <aside id="queue">
    <div class="qhead">Booth queue</div>
    <div id="queueList"><div id="queueEmpty">Click <b>Load PDFs</b> and select all booth submission PDFs. Files stay on your computer.</div></div>
  </aside>

  <section id="viewerWrap">
    <div id="vtools">
      <button class="zoombtn" id="zoomOut">−</button>
      <button class="zoombtn" id="zoomIn">+</button>
      <button class="btn" id="zoomFit" style="padding:4px 10px;font-size:12px">Fit</button>
      <span class="pg" id="pgInfo"></span>
    </div>
    <div id="viewer">
      <div id="viewerEmpty"><div class="big">W × L × H</div>No booth loaded</div>
    </div>
  </section>

  <aside id="formPane">
    <div id="formRoot"></div>
  </aside>
</main>

<div id="saveBar">
  <button class="btn" id="btnDelete" style="border-color:var(--warn);color:var(--warn)">Delete</button>
  <span id="saveState">No booth selected</span>
  <div class="navbtns">
    <button class="btn" id="btnPrev">←</button>
    <button class="btn primary" id="btnSave">Save ✓</button>
    <button class="btn" id="btnNext">→</button>
  </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

/* ───────────────────────── state ───────────────────────── */
const booths = [];            // {filename, file(File|null), label(obj|null), context{}}
let current = -1;
let zoom = 1.0, fitScale = 1.0, pdfDoc = null;

const $ = id => document.getElementById(id);

/* ───────────────────────── schema form definition ─────────
   Sections follow the SmartProof AI-check order. */
const SECTIONS = [
 {id:"ctx", idx:"00", title:"Booth context", fields:[
   {k:"booth_name", t:"text", lab:"Booth name", ph:"defaults to PDF file name"},
 ], hint:"Booth name defaults to the PDF file name — edit only if it differs."},

 {id:"dim", idx:"01", title:"Dimensions as drawn", fields:[
   {row:[{k:"length_x",t:"num",lab:"Length X (m)"},{k:"length_y",t:"num",lab:"Length Y (m)"}]},
 ], hint:"Read from top view / layout plan. 10000 mm → 10.0. Leave blank = not shown."},

 {id:"open", idx:"02", title:"Sides open as drawn", fields:[
   {k:"sides_open", t:"seg", lab:"Open sides", opts:["1","2","3","4","?"]},
 ], hint:"Island = 4 · one back wall = 3 · two = 2 · three = 1. ? = cannot tell."},

 {id:"swall", idx:"03", title:"Side wall", fields:[
   {k:"side_wall_present", t:"yn", lab:"Solid wall on an otherwise-open side?"},
   {grp:"side_wall_present", row:[{k:"side_wall_length_m",t:"num",lab:"Length (m)"},
                                  {k:"side_wall_height_m",t:"num",lab:"Height (m)"}]},
 ], hint:"A partial solid wall (≥30% of that side). Excludes fences, railings, towers, pylons, gates, truss."},

 {id:"bwall", idx:"04", title:"Back wall", fields:[
   {k:"back_wall_present", t:"yn", lab:"Full-length solid wall present?"},
   {grp:"back_wall_present", row:[{k:"back_wall_height_m",t:"num",lab:"Height (m)"},
                                  {k:"back_wall_length_m",t:"num",lab:"Length (m)"}]},
 ], hint:"Spans the full booth side length (≥90% if dimensions are approximate)."},

 {id:"tower", idx:"05", title:"Tower / other structure", fields:[
   {k:"tower_present", t:"yn", lab:"Structure rising above back wall / standalone / mid-booth?"},
   {grp:"tower_present", row:[{k:"tower_height_m",t:"num",lab:"Tallest height (m)"}]},
   {grp:"tower_present", k:"tower_setback_yn", t:"yn", lab:"Set back from nearest edge?"},
 ], hint:"Pylon, signage tower, gateway frame, elevated branding box. Height from floor, excluding hanging truss. Set back = Yes if pulled in from the edge, No if flush."},

 {id:"deck", idx:"06", title:"Double deck", fields:[
   {k:"deck_present", t:"yn", lab:"Second occupiable floor (stairs/lift)?"},
   {grp:"deck_present", row:[{k:"deck_height_m",t:"num",lab:"Deck height (m)"}]},
   {grp:"deck_present", row:[{k:"deck_w",t:"num",lab:"Width (m)"},{k:"deck_l",t:"num",lab:"Length (m)"}]},
 ]},

 {id:"bno", idx:"07", title:"Booth number on structure", fields:[
   {k:"bno_detected", t:"yn", lab:"Booth no. printed on the booth?"},
   {grp:"bno_detected", k:"bno_value", t:"text", lab:"Value as shown", ph:"3H20"},
 ], hint:"On the structure itself (back wall, fascia, tower, hanging sign) — not the drawing title block."},

 {id:"store", idx:"08", title:"Storage / meeting room", fields:[
   {k:"store_present", t:"yn", lab:"Enclosed room present?"},
   {grp:"store_present", row:[{k:"room_count",t:"num",lab:"Room count",step:1}]},
   {grp:"store_present", k:"doors", t:"doors", lab:"Doors  (compliance computed automatically)"},
 ], hint:"Add one entry per door. Inside-booth → passed. Booth-edge: inward/sliding → passed, outward/unknown → rejected."},

 {id:"truss", idx:"09", title:"Truss structure", fields:[
   {k:"truss_present", t:"yn", lab:"Suspended truss above booth?"},
   {grp:"truss_present", row:[
     {k:"truss_w",t:"num",lab:"Width (m)"},{k:"truss_l",t:"num",lab:"Length (m)"}]},
   {grp:"truss_present", row:[
     {k:"truss_top_h",t:"num",lab:"Top height (m)"},
     {k:"truss_low_h",t:"num",lab:"Lowest point (m)"}]},
   {grp:"truss_present", row:[
     {k:"truss_setback",t:"num",lab:"Min setback from edges (m)"}]},
 ], hint:"Include lighting fixtures only if part of the truss assembly."},

 {id:"notes", idx:"10", title:"Notes for human review", fields:[
   {k:"notes", t:"area", lab:"Anything ambiguous", ph:"e.g. height annotated only in Chinese; grid unclear on page 3"},
 ]},
];

/* ───────────────────────── form rendering ───────────────── */
function buildForm(){
  const root = $("formRoot"); root.innerHTML = "";
  SECTIONS.forEach(sec=>{
    const d = document.createElement("div");
    d.className = "sec"; d.id = "sec_"+sec.id;
    d.innerHTML = `<div class="shead"><span class="pip"></span>
      <span class="stitle">${sec.title}</span><span class="sidx">${sec.idx}</span></div>
      <div class="sbody"></div>`;
    d.querySelector(".shead").onclick = ()=>d.classList.toggle("closed");
    const body = d.querySelector(".sbody");
    sec.fields.forEach(f=> body.appendChild(renderField(f, sec)));
    if(sec.hint){const h=document.createElement("div");h.className="hint";h.textContent=sec.hint;body.appendChild(h);}
    root.appendChild(d);
  });
}
function renderField(f, sec){
  if(f.row){
    const r=document.createElement("div"); r.className="row";
    if(f.grp){r.dataset.grp=f.grp; r.classList.add("subgrp");}
    f.row.forEach(sub=>{const c=document.createElement("div");c.appendChild(renderField(sub,sec));r.appendChild(c);});
    return r;
  }
  const wrap=document.createElement("div"); wrap.className="subgrp"; wrap.style.marginTop="8px";
  if(f.grp){wrap.dataset.grp=f.grp;}
  const lab=document.createElement("label"); lab.className="fl"; lab.textContent=f.lab; wrap.appendChild(lab);
  let el;
  if(f.t==="text"||f.t==="num"){
    el=document.createElement("input");
    el.type=f.t==="num"?"number":"text";
    if(f.t==="num"){el.step=f.step||0.1; el.placeholder="null";}
    if(f.ph)el.placeholder=f.ph;
    el.id="f_"+f.k;
    el.addEventListener("input",()=>touch(sec));
  }else if(f.t==="area"){
    el=document.createElement("textarea"); el.id="f_"+f.k; if(f.ph)el.placeholder=f.ph;
    el.addEventListener("input",()=>touch(sec));
  }else if(f.t==="yn"){
    el=segEl(f.k,["Yes","No"],sec,true);
  }else if(f.t==="seg"){
    el=segEl(f.k,f.opts,sec,false);
  }else if(f.t==="doors"){
    el=document.createElement("div"); el.id="f_doors_box";
    const list=document.createElement("div"); list.id="doorsList";
    const add=document.createElement("button"); add.type="button"; add.className="btn";
    add.textContent="+ Add door"; add.style.cssText="padding:5px 10px;font-size:12px;margin-top:8px";
    add.onclick=()=>{addDoorRow();markStorageTouched();};
    el.appendChild(list); el.appendChild(add);
  }
  wrap.appendChild(el);
  return wrap;
}
function segEl(key,opts,sec,isYN){
  const s=document.createElement("div"); s.className="seg"; s.id="f_"+key;
  opts.forEach(o=>{
    const b=document.createElement("button"); b.type="button"; b.textContent=o; b.dataset.v=o;
    if(isYN&&o==="No")b.classList.add("no");
    b.onclick=()=>{
      const was=b.classList.contains("on");
      s.querySelectorAll("button").forEach(x=>x.classList.remove("on"));
      if(!was)b.classList.add("on");
      touch(sec);
      if(isYN)refreshGroups();
    };
    s.appendChild(b);
  });
  return s;
}
function segGet(key){const on=document.querySelector("#f_"+key+" button.on");return on?on.dataset.v:null;}
function segSet(key,val){
  document.querySelectorAll("#f_"+key+" button").forEach(b=>
    b.classList.toggle("on", val!==null&&val!==undefined&&String(b.dataset.v)===String(val)));
}
function touch(sec){ $("sec_"+sec.id).classList.add("touched"); markDirty(); }
function refreshGroups(){
  document.querySelectorAll("[data-grp]").forEach(g=>{
    g.classList.toggle("hidden", segGet(g.dataset.grp)!=="Yes");
  });
}

/* ───────────────────────── doors widget ──────────────────── */
function doorComplianceOf(location, swing){
  if(location==="inside_booth") return {compliance:"passed", suggestion:""};
  if(location==="booth_edge"){
    if(swing==="inward"||swing==="sliding") return {compliance:"passed", suggestion:""};
    if(swing==="outward") return {compliance:"rejected",
      suggestion:"Door swings outward detected. Please revise your design and add a 'door swings inward' sign or text."};
    return {compliance:"rejected",  // unknown / not set
      suggestion:"No door swing direction detected. Please revise your design and add a 'door swings inward' sign or text."};
  }
  return {compliance:null, suggestion:""};   // location not chosen yet
}
function miniSeg(opts, value, onchange){
  const s=document.createElement("div"); s.className="seg";
  opts.forEach(o=>{
    const b=document.createElement("button"); b.type="button"; b.textContent=o.label; b.dataset.v=o.value;
    if(o.value===value)b.classList.add("on");
    b.onclick=()=>{const was=b.classList.contains("on");
      s.querySelectorAll("button").forEach(x=>x.classList.remove("on"));
      if(!was)b.classList.add("on"); onchange();};
    s.appendChild(b);
  });
  return s;
}
const miniSegGet=seg=>{const on=seg.querySelector("button.on");return on?on.dataset.v:null;};
function markStorageTouched(){const s=$("sec_store"); if(s)s.classList.add("touched"); markDirty();}
function addDoorRow(loc=null, swing=null){
  const list=$("doorsList"); if(!list)return;
  const row=document.createElement("div"); row.className="door-row";
  row.style.cssText="border:1px solid var(--line);border-radius:7px;padding:9px;margin-top:8px;background:var(--bg)";
  const head=document.createElement("div"); head.style.cssText="display:flex;align-items:center;gap:8px;margin-bottom:4px";
  const title=document.createElement("span"); title.className="door-title"; title.style.cssText="font-size:12px;font-weight:700;flex:1";
  const rm=document.createElement("button"); rm.type="button"; rm.textContent="✕"; rm.className="zoombtn";
  rm.style.cssText="width:26px;height:24px;font-size:12px";
  rm.onclick=()=>{row.remove();renumberDoors();markStorageTouched();};
  head.appendChild(title); head.appendChild(rm);
  const locLab=document.createElement("label"); locLab.className="fl"; locLab.textContent="Location";
  const locSeg=miniSeg([{label:"Inside booth",value:"inside_booth"},{label:"Booth edge",value:"booth_edge"}],
                       loc, ()=>{recomputeDoor(row);markStorageTouched();});
  locSeg.classList.add("door-loc");
  const swLab=document.createElement("label"); swLab.className="fl"; swLab.style.marginTop="6px"; swLab.textContent="Swing direction";
  const swSeg=miniSeg([{label:"Inward",value:"inward"},{label:"Outward",value:"outward"},
                       {label:"Sliding",value:"sliding"},{label:"Unknown",value:"unknown"}],
                      swing, ()=>{recomputeDoor(row);markStorageTouched();});
  swSeg.classList.add("door-swing");
  const badge=document.createElement("div"); badge.className="door-badge"; badge.style.cssText="margin-top:7px;font-size:12px;font-weight:600;line-height:1.35";
  row.append(head, locLab, locSeg, swLab, swSeg, badge);
  list.appendChild(row);
  renumberDoors(); recomputeDoor(row);
}
function renumberDoors(){
  document.querySelectorAll("#doorsList .door-row").forEach((r,i)=>{
    r.querySelector(".door-title").textContent="Door "+(i+1);
  });
}
function recomputeDoor(row){
  const loc=miniSegGet(row.querySelector(".door-loc"));
  const sw=miniSegGet(row.querySelector(".door-swing"));
  const {compliance,suggestion}=doorComplianceOf(loc,sw);
  const badge=row.querySelector(".door-badge");
  if(!compliance){badge.textContent="Choose a location to compute compliance";badge.style.color="var(--faint)";}
  else if(compliance==="passed"){badge.textContent="✓ Passed";badge.style.color="var(--pass)";}
  else{badge.textContent="✕ Rejected — "+suggestion;badge.style.color="var(--warn)";}
}
function readDoors(){
  const doors=[];
  document.querySelectorAll("#doorsList .door-row").forEach(r=>{
    const location=miniSegGet(r.querySelector(".door-loc"));
    const swing_direction=miniSegGet(r.querySelector(".door-swing"))||"unknown";
    const {compliance,suggestion}=doorComplianceOf(location,swing_direction);
    doors.push({location, swing_direction, compliance, suggestion});
  });
  return doors;
}

/* ───────────────────────── form <-> label object ─────────── */
const numv = k => {const v=$("f_"+k).value.trim(); return v===""?null:parseFloat(v);};
const txtv = k => {const v=$("f_"+k).value.trim(); return v===""?null:v;};
const ynv  = k => {const v=segGet(k); return v==="Yes"?true:(v==="No"?false:null);};

function formToRecord(filename){
  const so=segGet("sides_open");
  const doors=readDoors();
  return {
    pdf_filename: filename,
    booth_name: txtv("booth_name")||"",
    label:{
      booth_number:{detected:ynv("bno_detected")===true, value:txtv("bno_value")},
      dimensions:{length_x:numv("length_x"), length_y:numv("length_y")},
      sides_open: so&&so!=="?"?parseInt(so):null,
      side_wall:{present:ynv("side_wall_present")===true,
                 length_m:numv("side_wall_length_m"), height_m:numv("side_wall_height_m")},
      back_wall:{present:ynv("back_wall_present")===true,
                 height_m:numv("back_wall_height_m"), length_m:numv("back_wall_length_m")},
      tower_or_structure:{present:ynv("tower_present")===true,
                 tallest_height_m:numv("tower_height_m"),
                 setback:ynv("tower_setback_yn")},
      double_deck:{present:ynv("deck_present")===true,
                 double_deck_height_m:numv("deck_height_m"),
                 width_m:numv("deck_w"), length_m:numv("deck_l")},
      storage_meeting_room:{present:ynv("store_present")===true,
                 room_count:numv("room_count"),
                 door_count:doors.length,
                 doors:doors},
      truss:{present:ynv("truss_present")===true,
             width_m:numv("truss_w"), length_m:numv("truss_l"),
             top_height_m:numv("truss_top_h"),
             lowest_structural_point_height_m:numv("truss_low_h"),
             minimum_setback_from_booth_edge_m:numv("truss_setback")},
      notes: txtv("notes")||""
    }
  };
}
function clearForm(){
  document.querySelectorAll("#formRoot input,#formRoot textarea").forEach(e=>e.value="");
  document.querySelectorAll("#formRoot .seg button").forEach(b=>b.classList.remove("on"));
  document.querySelectorAll(".sec").forEach(s=>s.classList.remove("touched"));
  const dl=$("doorsList"); if(dl)dl.innerHTML="";
  refreshGroups();
}
function recordToForm(rec){
  clearForm();
  const set=(k,v)=>{if(v!==null&&v!==undefined&&$("f_"+k))$("f_"+k).value=v;};
  const yn=(k,v)=>{if(v===true)segSet(k,"Yes");else if(v===false)segSet(k,"No");};
  set("booth_name",rec.booth_name);
  const L=rec.label||{};
  yn("bno_detected",L.booth_number?.detected); set("bno_value",L.booth_number?.value);
  set("length_x",L.dimensions?.length_x ?? L.dimensions?.width_m);
  set("length_y",L.dimensions?.length_y ?? L.dimensions?.length_m);
  segSet("sides_open",L.sides_open);
  yn("side_wall_present",L.side_wall?.present);
  set("side_wall_length_m",L.side_wall?.length_m); set("side_wall_height_m",L.side_wall?.height_m);
  yn("back_wall_present",L.back_wall?.present);
  set("back_wall_height_m",L.back_wall?.height_m); set("back_wall_length_m",L.back_wall?.length_m);
  yn("tower_present",L.tower_or_structure?.present);
  set("tower_height_m",L.tower_or_structure?.tallest_height_m ?? L.tower_or_structure?.max_height_m);
  const tsb=L.tower_or_structure?.setback;
  const tsbM=L.tower_or_structure?.setback_from_nearest_edge_m ?? L.tower_or_structure?.setback_m;
  if(tsb===true||tsbM>0){segSet("tower_setback_yn","Yes");}
  else if(tsb===false||tsbM===0){segSet("tower_setback_yn","No");}
  yn("deck_present",L.double_deck?.present);
  set("deck_height_m",L.double_deck?.double_deck_height_m ?? L.double_deck?.height_m);
  set("deck_w",L.double_deck?.width_m); set("deck_l",L.double_deck?.length_m);
  yn("store_present",L.storage_meeting_room?.present);
  set("room_count",L.storage_meeting_room?.room_count);
  (L.storage_meeting_room?.doors||[]).forEach(d=>addDoorRow(d.location, d.swing_direction));
  yn("truss_present",L.truss?.present);
  set("truss_w",L.truss?.width_m); set("truss_l",L.truss?.length_m);
  set("truss_top_h",L.truss?.top_height_m ?? L.truss?.total_height_m);
  set("truss_low_h",L.truss?.lowest_structural_point_height_m ?? L.truss?.lowest_point_height_m);
  set("truss_setback",L.truss?.minimum_setback_from_booth_edge_m ?? L.truss?.min_setback_from_edge_m);
  set("notes",L.notes);
  refreshGroups();
  document.querySelectorAll(".sec").forEach(s=>s.classList.add("touched"));
}

/* ───────────────────────── queue ─────────────────────────── */
function renderQueue(){
  const list=$("queueList"); list.innerHTML="";
  if(!booths.length){list.innerHTML='<div id="queueEmpty">Click <b>Load PDFs</b> and select all booth submission PDFs. Files stay on your computer.</div>';}
  booths.forEach((b,i)=>{
    const d=document.createElement("div");
    d.className="qitem"+(b.label?" done":"")+(i===current?" active":"");
    d.innerHTML=`<span class="dot"></span><span class="nm">${b.filename}</span>`;
    d.onclick=()=>selectBooth(i);
    list.appendChild(d);
  });
  const n=booths.filter(b=>b.label).length;
  $("exportNote").textContent=`${n} / ${booths.length} labeled`;
}

async function selectBooth(i){
  if(i<0||i>=booths.length)return;
  current=i; renderQueue();
  const b=booths[i];
  clearForm();
  if(b.record)recordToForm(b.record);
  if(!$("f_booth_name").value) $("f_booth_name").value = b.filename.replace(/\.pdf$/i,"");
  setSaveState(b.label?"Saved ✓":"Not saved yet", !!b.label);
  if(b.file){await renderPDF(b.file);}
  else{$("viewer").innerHTML='<div id="viewerEmpty"><div class="big">PDF MISSING</div>Imported label without its PDF — reload the PDF to view.</div>';$("pgInfo").textContent="";}
}

/* ───────────────────────── pdf rendering ─────────────────── */
async function renderPDF(file){
  const viewer=$("viewer"); viewer.innerHTML="Loading…";
  const buf=await file.arrayBuffer();
  pdfDoc=await pdfjsLib.getDocument({data:buf}).promise;
  const first=await pdfDoc.getPage(1);
  const vw=viewer.clientWidth-40;
  fitScale=vw/first.getViewport({scale:1}).width;
  zoom=1.0;
  await drawPages();
}
async function drawPages(){
  if(!pdfDoc)return;
  const viewer=$("viewer"); viewer.innerHTML="";
  const scale=fitScale*zoom;
  for(let p=1;p<=pdfDoc.numPages;p++){
    const page=await pdfDoc.getPage(p);
    const vp=page.getViewport({scale:scale*(window.devicePixelRatio||1)});
    const c=document.createElement("canvas");
    c.dataset.page=p;
    c.width=vp.width;c.height=vp.height;
    c.style.width=(vp.width/(window.devicePixelRatio||1))+"px";
    await page.render({canvasContext:c.getContext("2d"),viewport:vp}).promise;
    viewer.appendChild(c);
  }
  updatePgInfo();
}
function updatePgInfo(){
  if(!pdfDoc){$("pgInfo").textContent="";return;}
  const viewer=$("viewer");
  let cur=1;
  for(const c of viewer.querySelectorAll("canvas")){
    if(c.offsetTop<=viewer.scrollTop+viewer.clientHeight/2)cur=+c.dataset.page;
  }
  $("pgInfo").textContent=`Page ${cur} / ${pdfDoc.numPages} · ${Math.round(zoom*100)}%`;
}
$("viewer").addEventListener("scroll",updatePgInfo);
$("zoomIn").onclick=()=>{zoom=Math.min(zoom*1.25,4);drawPages();};
$("zoomOut").onclick=()=>{zoom=Math.max(zoom/1.25,.3);drawPages();};
$("zoomFit").onclick=()=>{zoom=1;drawPages();};

/* ───────────────────────── save / nav ────────────────────── */
function setSaveState(t,ok){const s=$("saveState");s.textContent=t;s.className=ok?"ok":"";}
function markDirty(){if(current>=0)setSaveState("Unsaved changes…",false);}

$("btnSave").onclick=()=>{
  if(current<0)return;
  const b=booths[current];
  const rec=formToRecord(b.filename);
  if(!rec.booth_name){alert("Fill in the booth name (section 00).");return;}
  b.record=rec; b.label=rec.label;
  setSaveState("Saved ✓",true); renderQueue();
};
$("btnPrev").onclick=()=>selectBooth(current-1);
$("btnNext").onclick=()=>selectBooth(current+1);
$("btnDelete").onclick=()=>{
  if(current<0)return;
  const b=booths[current];
  if(!confirm(`Remove "${b.filename}" from the queue?`+(b.record?" Its saved label will be discarded.":"")))return;
  booths.splice(current,1);
  if(!booths.length){
    current=-1; clearForm();
    $("viewer").innerHTML='<div id="viewerEmpty"><div class="big">W × L × H</div>No booth loaded</div>';
    $("pgInfo").textContent=""; pdfDoc=null;
    setSaveState("No booth selected",false); renderQueue(); return;
  }
  current=Math.min(current, booths.length-1);
  selectBooth(current);
};
document.addEventListener("keydown",e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==="s"){e.preventDefault();$("btnSave").click();}
});

/* ───────────────────────── load / import / export ────────── */
$("btnLoad").onclick=()=>$("fileInput").click();
$("fileInput").addEventListener("change",e=>{
  for(const f of e.target.files){
    const existing=booths.find(b=>b.filename===f.name);
    if(existing){existing.file=f;}
    else booths.push({filename:f.name,file:f,label:null,record:null});
  }
  renderQueue();
  if(current<0&&booths.length)selectBooth(0);
  e.target.value="";
});

$("btnImport").onclick=()=>$("importInput").click();
$("importInput").addEventListener("change",async e=>{
  const f=e.target.files[0]; if(!f)return;
  const text=await f.text();
  let n=0;
  for(const line of text.split("\n")){
    if(!line.trim())continue;
    try{
      const rec=JSON.parse(line);
      let b=booths.find(x=>x.filename===rec.pdf_filename);
      if(!b){b={filename:rec.pdf_filename,file:null};booths.push(b);}
      b.record=rec;b.label=rec.label;n++;
    }catch(err){console.warn("bad line",err);}
  }
  alert(`Imported ${n} labels. PDFs for imported rows must be re-loaded to view them.`);
  renderQueue();
  e.target.value="";
});

$("btnExport").onclick=()=>{
  const done=booths.filter(b=>b.record);
  if(!done.length){alert("Nothing labeled yet.");return;}
  const jsonl=done.map(b=>JSON.stringify(b.record)).join("\n")+"\n";
  const blob=new Blob([jsonl],{type:"application/jsonl"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);a.download="labels.jsonl";a.click();
  URL.revokeObjectURL(a.href);
};

$("btnExportPdfs").onclick=async()=>{
  if(!booths.length){alert("No PDFs loaded.");return;}
  const withFile=booths.filter(b=>b.file);
  // manifest of everything in the queue, so you can see what's selected
  const manifest=["filename\tlabel_status\tpdf_in_zip",
    ...booths.map(b=>`${b.filename}\t${b.record?"labeled":"unlabeled"}\t${b.file?"yes":"no (import only)"}`)
  ].join("\n")+"\n";
  if(!withFile.length){
    // no actual PDF files in memory — still let them export the list
    const blob=new Blob([manifest],{type:"text/plain"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);a.download="pdf_manifest.txt";a.click();
    URL.revokeObjectURL(a.href);
    alert("No PDF files are in memory (these rows were imported). Exported the manifest list instead.");
    return;
  }
  const btn=$("btnExportPdfs"); const orig=btn.textContent;
  btn.textContent="Zipping…"; btn.disabled=true;
  try{
    const zip=new JSZip();
    const folder=zip.folder("pdfs");
    withFile.forEach(b=>folder.file(b.filename,b.file));
    zip.file("pdf_manifest.txt",manifest);
    const blob=await zip.generateAsync({type:"blob"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);a.download="booth_pdfs.zip";a.click();
    URL.revokeObjectURL(a.href);
  }catch(err){
    alert("Could not build the zip: "+err);
  }finally{
    btn.textContent=orig; btn.disabled=false;
  }
};

/* warn before closing with unsaved work — labels live only in memory */
window.addEventListener("beforeunload",e=>{
  if(booths.some(b=>b.record)){e.preventDefault();e.returnValue="";}
});

buildForm();refreshGroups();
</script>
</body>
</html>
